<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wacom Input Test</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f1;
      color: #1f2428;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
    }

    canvas {
      width: 100%;
      height: 100vh;
      display: block;
      background: #ffffff;
      touch-action: none;
      cursor: crosshair;
    }

    aside {
      border-left: 1px solid #d9d9d2;
      padding: 18px;
      background: #fbfbf8;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 650;
    }

    dl {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 8px 12px;
      margin: 0;
      font-size: 14px;
    }

    dt {
      color: #697077;
    }

    dd {
      margin: 0;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }

    .hint {
      margin-top: 18px;
      font-size: 13px;
      line-height: 1.5;
      color: #596168;
    }

    button {
      margin-top: 16px;
      appearance: none;
      border: 1px solid #c8ccc7;
      background: #ffffff;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="pad"></canvas>
  <aside>
    <h1>Wacom 输入测试</h1>
    <dl>
      <dt>状态</dt><dd id="status">等待笔尖进入画布</dd>
      <dt>类型</dt><dd id="pointerType">-</dd>
      <dt>坐标</dt><dd id="position">-</dd>
      <dt>压感</dt><dd id="pressure">-</dd>
      <dt>倾斜</dt><dd id="tilt">-</dd>
      <dt>按钮</dt><dd id="buttons">-</dd>
      <dt>事件数</dt><dd id="count">0</dd>
      <dt>采样率</dt><dd id="rate">-</dd>
      <dt>最大压感</dt><dd id="maxPressure">0</dd>
      <dt>浏览器</dt><dd id="ua"></dd>
    </dl>
    <button id="clear">清空画布</button>
    <p class="hint">
      用影拓笔在左侧白色区域轻重不同地画线。<br>
      如果压感会在 0 到 1 之间连续变化，说明浏览器能收到压感。<br>
      如果一直是 0、0.5 或 1，说明还需要原生 AppKit 测试或驱动检查。
    </p>
  </aside>

  <script>
    const canvas = document.getElementById("pad");
    const ctx = canvas.getContext("2d");
    const fields = {
      status: document.getElementById("status"),
      pointerType: document.getElementById("pointerType"),
      position: document.getElementById("position"),
      pressure: document.getElementById("pressure"),
      tilt: document.getElementById("tilt"),
      buttons: document.getElementById("buttons"),
      count: document.getElementById("count"),
      rate: document.getElementById("rate"),
      maxPressure: document.getElementById("maxPressure"),
      ua: document.getElementById("ua"),
    };

    let drawing = false;
    let last = null;
    let eventCount = 0;
    let maxPressure = 0;
    let firstTime = 0;

    fields.ua.textContent = navigator.userAgent;

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * scale));
      canvas.height = Math.max(1, Math.floor(rect.height * scale));
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
    }

    function update(event) {
      const now = performance.now();
      if (!firstTime) firstTime = now;
      eventCount += 1;
      maxPressure = Math.max(maxPressure, event.pressure || 0);

      const elapsed = Math.max(0.001, (now - firstTime) / 1000);
      const rate = eventCount / elapsed;

      fields.status.textContent = event.type;
      fields.pointerType.textContent = event.pointerType || "-";
      fields.position.textContent = `${event.offsetX.toFixed(1)}, ${event.offsetY.toFixed(1)}`;
      fields.pressure.textContent = Number(event.pressure || 0).toFixed(4);
      fields.tilt.textContent = `${event.tiltX || 0}, ${event.tiltY || 0}`;
      fields.buttons.textContent = `${event.buttons}`;
      fields.count.textContent = String(eventCount);
      fields.rate.textContent = `${rate.toFixed(1)} events/s`;
      fields.maxPressure.textContent = maxPressure.toFixed(4);
    }

    function draw(event) {
      const p = Math.max(0.02, event.pressure || 0.02);
      const point = { x: event.offsetX, y: event.offsetY, p };
      if (last) {
        ctx.strokeStyle = "#111111";
        ctx.lineWidth = 1 + p * 24;
        ctx.beginPath();
        ctx.moveTo(last.x, last.y);
        ctx.lineTo(point.x, point.y);
        ctx.stroke();
      }
      last = point;
    }

    canvas.addEventListener("pointerenter", update);
    canvas.addEventListener("pointerdown", (event) => {
      canvas.setPointerCapture(event.pointerId);
      drawing = true;
      last = null;
      update(event);
      draw(event);
    });

    canvas.addEventListener("pointermove", (event) => {
      update(event);
      if (drawing) draw(event);
    });

    canvas.addEventListener("pointerup", (event) => {
      drawing = false;
      last = null;
      update(event);
    });

    canvas.addEventListener("pointercancel", (event) => {
      drawing = false;
      last = null;
      update(event);
    });

    document.getElementById("clear").addEventListener("click", () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      eventCount = 0;
      maxPressure = 0;
      firstTime = 0;
      fields.count.textContent = "0";
      fields.maxPressure.textContent = "0";
      fields.rate.textContent = "-";
    });

    window.addEventListener("resize", resize);
    resize();
  </script>
</body>
</html>
